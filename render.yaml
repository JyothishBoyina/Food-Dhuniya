services:
  # Backend Service (Spring Boot)
  - type: web
    name: food-dhuniya-backend
    env: docker
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: static
          name: food-dhuniya-frontend
          property: host

  # Frontend Service (React / Vite)
  - type: web
    name: food-dhuniya-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: food-dhuniya-backend
          property: host
        suffix: /api
