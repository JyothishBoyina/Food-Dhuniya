# Server configuration
server.port=8080

# Application Name
spring.application.name=FoodDhuniya

# ===============================
# MySQL Database Configuration
# ===============================
# Note: You need to specify your local DB credentials before running the app.
# Create a database named `fooddhuniya` in MySQL first.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fooddhuniya?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Jyothish@77}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Application JWT Properties
# ===============================
app.jwtSecret=${JWT_SECRET:foodDhuniyaSuperSecretKeyForJwtGenerationMustBeLongEnoughForHS512Algorithm1234567890}
app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# ===============================
# Email SMTP Configuration (Gmail)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:reyyanna@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ghpfidhiifqvctrr}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.debug=true
